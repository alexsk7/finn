{% extends "base.html" %}
{% block title %}Budget{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;gap:var(--gap);">

  <div class="grid-4" id="budget-kpis"></div>

  <div class="grid-2">
    <div class="card">
      <div class="section-title">Income</div>
      <table class="data-table" id="income-table">
        <thead><tr><th>Category</th><th class="num">Target</th><th class="num">Actual MTD</th><th class="num">Progress</th></tr></thead>
        <tbody id="income-body"></tbody>
      </table>
    </div>
    <div class="card">
      <div class="section-title">Expenses</div>
      <table class="data-table">
        <thead><tr><th>Category</th><th class="num">Target</th><th class="num">Actual MTD</th><th class="num">Progress</th></tr></thead>
        <tbody id="expense-body"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Spending Breakdown</div>
    <div class="chart-wrap" style="height:220px;"><canvas id="budget-chart"></canvas></div>
  </div>

</div>
{% endblock %}
{% block scripts %}
<script>
async function loadBudget() {
  const cats = await fetch('/api/cashflow').then(r=>r.json());

  const income  = cats.filter(c=>c.direction==='income');
  const expense = cats.filter(c=>c.direction==='expense');

  const totalIncTarget = income.reduce((s,c)=>s+c.monthly_target,0);
  const totalExpTarget = expense.reduce((s,c)=>s+c.monthly_target,0);
  const totalIncActual = income.reduce((s,c)=>s+c.actual,0);
  const totalExpActual = expense.reduce((s,c)=>s+c.actual,0);
  const savingsRate = totalIncActual > 0 ? ((totalIncActual-totalExpActual)/totalIncActual*100) : 0;

  document.getElementById('budget-kpis').innerHTML = `
    <div class="card"><div class="card-title">Income MTD</div><div class="card-value" style="color:var(--green)">${fmt(totalIncActual)}</div><div class="card-sub">target ${fmt(totalIncTarget)}</div></div>
    <div class="card"><div class="card-title">Expenses MTD</div><div class="card-value" style="color:var(--red)">${fmt(totalExpActual)}</div><div class="card-sub">target ${fmt(totalExpTarget)}</div></div>
    <div class="card"><div class="card-title">Net Cash Flow</div><div class="card-value" style="color:${clr(totalIncActual-totalExpActual)}">${fmt(totalIncActual-totalExpActual)}</div></div>
    <div class="card"><div class="card-title">Savings Rate</div><div class="card-value" style="color:${clr(savingsRate)}">${savingsRate.toFixed(0)}%</div></div>`;

  function catRow(c) {
    const pctUsed = c.monthly_target > 0 ? Math.min(c.actual / c.monthly_target * 100, 100) : 0;
    const over = c.actual > c.monthly_target && c.direction === 'expense';
    const barColor = over ? 'var(--red)' : c.direction === 'income' ? 'var(--green)' : 'var(--blue)';
    return `<tr>
      <td>${c.name}</td>
      <td class="num" style="color:var(--text-dim);">${fmt(c.monthly_target)}</td>
      <td class="num" style="color:${over?'var(--red)':'var(--text-head)'}">${fmt(c.actual)}</td>
      <td>
        <div class="bar-track" style="width:100px;">
          <div class="bar-fill" style="width:${pctUsed.toFixed(0)}%;background:${barColor};"></div>
        </div>
        <span style="font-size:10px;color:${over?'var(--red)':'var(--text-dim)'};">${pctUsed.toFixed(0)}%${over?' ⚠':''}</span>
      </td>
    </tr>`;
  }

  document.getElementById('income-body').innerHTML  = income.map(catRow).join('');
  document.getElementById('expense-body').innerHTML = expense.map(catRow).join('');

  // Bar chart of expenses
  const expSorted = [...expense].sort((a,b)=>b.actual-a.actual);
  new Chart(document.getElementById('budget-chart'), {
    type: 'bar',
    data: {
      labels: expSorted.map(c=>c.name),
      datasets: [
        { label: 'Actual',  data: expSorted.map(c=>c.actual),          backgroundColor: '#4080f0', borderRadius: 3 },
        { label: 'Target',  data: expSorted.map(c=>c.monthly_target),  backgroundColor: 'rgba(255,255,255,0.05)', borderColor:'rgba(255,255,255,0.2)', borderWidth:1, borderRadius: 3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { tooltip: { callbacks: { label: ctx=>ctx.dataset.label+': '+fmt(ctx.raw) } } },
      scales: { y: { ticks: { callback: v=>fmt(v) } } }
    }
  });
}
loadBudget();
</script>
{% endblock %}

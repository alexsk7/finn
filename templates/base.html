<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FINCTL — {% block title %}Dashboard{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
<div class="app">

  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open navigation">☰</button>
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;">
      <!-- Icon mark inline SVG (scaled from logo.svg) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="28" height="28" style="flex-shrink:0;">
        <defs>
          <linearGradient id="tb-cg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4080f0" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#4080f0" stop-opacity="1"/>
          </linearGradient>
          <linearGradient id="tb-fg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4080f0" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#4080f0" stop-opacity="0"/>
          </linearGradient>
          <clipPath id="tb-clip"><rect x="0" y="0" width="80" height="80" rx="14"/></clipPath>
        </defs>
        <rect x="0" y="0" width="80" height="80" rx="14" fill="#131820"/>
        <rect x="0" y="0" width="80" height="80" rx="14" fill="none" stroke="#232d3f" stroke-width="1.5"/>
        <g clip-path="url(#tb-clip)" opacity="0.3">
          <line x1="12" y1="28" x2="68" y2="28" stroke="#232d3f" stroke-width="1"/>
          <line x1="12" y1="44" x2="68" y2="44" stroke="#232d3f" stroke-width="1"/>
          <line x1="12" y1="60" x2="68" y2="60" stroke="#232d3f" stroke-width="1"/>
        </g>
        <polygon points="14,62 24,52 34,56 44,40 54,32 66,20 66,64 14,64"
          fill="url(#tb-fg)" clip-path="url(#tb-clip)"/>
        <polyline points="14,62 24,52 34,56 44,40 54,32 66,20"
          fill="none" stroke="url(#tb-cg)" stroke-width="2.5"
          stroke-linejoin="round" stroke-linecap="round" clip-path="url(#tb-clip)"/>
        <circle cx="66" cy="20" r="3.5" fill="#22d3a0"/>
        <circle cx="66" cy="20" r="6" fill="none" stroke="#22d3a0" stroke-width="1" opacity="0.35"/>
      </svg>
      <div class="topbar-brand"><span>FIN</span>CTL</div>
    </a>
    
    <div class="topbar-nw" id="topbar-nw">—</div>
    <div class="topbar-meta">
      <span id="topbar-ytd" style="font-size:11px;"></span>
      <span id="topbar-date" style="color:var(--text-dim);font-size:10px;"></span>
    </div>
  </header>

  <div class="sidebar-backdrop" onclick="closeSidebar()"></div>
  <nav class="sidebar">
    <div class="sidebar-section">Overview</div>
    <a href="/" {% if active == 'dashboard' %}class="active"{% endif %}><span class="nav-icon">◈</span> Dashboard</a>
    
    <div class="sidebar-section">Wealth</div>
    <a href="/accounts" {% if active == 'accounts' %}class="active"{% endif %}><span class="nav-icon">◻</span> Accounts</a>
    <a href="/investments" {% if active == 'investments' %}class="active"{% endif %}><span class="nav-icon">◆</span> Investments</a>
    <a href="/real-estate" {% if active == 'realestate' %}class="active"{% endif %}><span class="nav-icon">⌂</span> Real Estate</a>

    <div class="sidebar-section">Planning</div>
    <a href="/budget" {% if active == 'budget' %}class="active"{% endif %}><span class="nav-icon">▦</span> Budget</a>
    <a href="/rebalance" {% if active == 'rebalance' %}class="active"{% endif %}><span class="nav-icon">⇌</span> Rebalance</a>
    <a href="/tax" {% if active == 'tax' %}class="active"{% endif %}><span class="nav-icon">◈</span> Tax & TLH</a>
    
    <div class="sidebar-section">Manage</div>
    <a href="/journal" {% if active == 'journal' %}class="active"{% endif %}><span class="nav-icon">◉</span> Journal</a>
    <a href="/data" {% if active == 'data' %}class="active"{% endif %}><span class="nav-icon">⊞</span> Data</a>
    
    

    <div style="margin-top:24px;padding:4px 8px;border-top:1px solid var(--border);"
         x-data="portfolioWidget()" x-init="init()">
      <div class="sidebar-section" style="margin:0 0 6px;">Portfolio</div>
      <select @change="switchTo($event.target.value)" style="
        width:100%;padding:7px 10px;
        background:var(--bg2);border:1px solid var(--border);border-radius:5px;
        color:var(--text-head);font-family:var(--font);font-size:12px;cursor:pointer;
      ">
        <template x-for="p in portfolios" :key="p.name">
          <option :value="p.name" :selected="p.is_active" x-text="p.name"></option>
        </template>
      </select>
      <div style="margin-top:8px;">
        <a href="/data#portfolios" style="font-size:11px;color:var(--text-dim);text-decoration:none;transition:color .15s;"
           onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-dim)'">
          Manage portfolios →
        </a>
      </div>
    </div>

    <button id="refresh-btn" onclick="refreshPrices()" title="Refresh prices from Yahoo Finance" style="
      display:block;width:100%;
      margin: auto;
      background:transparent;border:1px solid var(--border);border-radius:4px;
      color:var(--text-dim);font-family:var(--font);font-size:12px;
      padding:4px 8px;cursor:pointer;transition:color .15s,border-color .15s;
    ">↻ <span class="refresh-label">Prices</span></button>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>

<script>
window.CURRENCY = {{ (profile.currency_symbol or '$') | tojson }};
window.USER_NAME = {{ (profile.user_name or '') | tojson }};
</script>
<script>
const COLORS = {
  us_equity:        '#4080f0',
  intl_equity:      '#22d3a0',
  bond:             '#f0b040',
  real_estate_fund: '#f07040',
  cash_equiv:       '#8060f0',
  commodity:        '#e060a0',
  crypto:           '#60c0e0',
  other:            '#506070',
};

const CLASS_LABELS = {
  us_equity:        'US Equity',
  intl_equity:      'Intl Equity',
  bond:             'Bonds',
  real_estate_fund: 'Real Estate',
  cash_equiv:       'Cash / MM',
  commodity:        'Commodity',
  crypto:           'Crypto',
  other:            'Other',
};

Chart.defaults.color = '#5a6a85';
Chart.defaults.borderColor = '#232d3f';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.font.size = 11;

function fmt(n) {
  if (n == null) return '—';
  const a = Math.abs(n), s = n < 0 ? '-' : '', c = window.CURRENCY || '$';
  if (a >= 1e6) return s + c + (a/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return s + c + (a/1e3).toFixed(1) + 'k';
  return s + c + a.toFixed(0);
}
function pct(n) {
  if (n == null) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}
function clr(n) { return n > 0 ? 'var(--green)' : n < 0 ? 'var(--red)' : 'var(--text-dim)'; }
function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
}

function buildCatOpts(cats, selectedVal) {
  const known = cats.some(c => c.name === selectedVal);
  const orphan = selectedVal && !known
    ? `<option value="${selectedVal}" selected>${selectedVal}</option>` : '';
  return `<option value="">— select category —</option>${orphan}` +
    cats.map(c =>
      `<option value="${esc(c.name)}"${c.name === selectedVal ? ' selected' : ''}>${esc(c.name)}</option>`
    ).join('');
}

function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
function closeSidebar()  { document.body.classList.remove('sidebar-open'); }
document.querySelectorAll('.sidebar a').forEach(a => a.addEventListener('click', closeSidebar));

async function refreshPrices() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Fetching…';
  btn.disabled = true;
  btn.style.color = 'var(--yellow)';
  try {
    const res = await fetch('/api/prices/refresh', {method:'POST'});
    const data = await res.json();
    const n = data.updated?.length ?? 0;
    const f = data.failed?.length ?? 0;
    btn.textContent = `✓ ${n} updated${f ? ` (${f} failed)` : ''}`;
    btn.style.color = f ? 'var(--yellow)' : 'var(--green)';
    btn.style.borderColor = f ? 'var(--yellow)' : 'var(--green)';
    setTimeout(() => {
      btn.textContent = '↻ Prices';
      btn.style.color = 'var(--text-dim)';
      btn.style.borderColor = 'var(--border)';
      btn.disabled = false;
      if (typeof loadDashboard === 'function') loadDashboard();
      if (typeof loadInvestments === 'function') loadInvestments();
    }, 3000);
  } catch(e) {
    btn.textContent = '✗ Error';
    btn.style.color = 'var(--red)';
    btn.disabled = false;
  }
}

function portfolioWidget() {
  return {
    active: '', portfolios: [],
    async init() {
      try {
        const d = await fetch('/api/portfolios').then(r => r.json());
        this.active = d.active;
        this.portfolios = d.portfolios;
      } catch(e) {}
    },
    async switchTo(name) {
      if (name === this.active) return;
      await fetch('/api/portfolio/switch', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name}),
      });
      window.location.reload();
    },
  };
}

fetch('/api/dashboard').then(r => r.json()).then(d => {
  document.getElementById('topbar-nw').textContent = fmt(d.net_worth);
  const ytd = d.ytd_change_pct;
  const el = document.getElementById('topbar-ytd');
  el.textContent = (ytd >= 0 ? '▲ ' : '▼ ') + Math.abs(ytd).toFixed(1) + '% YTD';
  el.style.color = ytd >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}Account{% endblock %}

{% block head %}
<style>
.acct-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  flex-wrap: wrap;
}
.acct-header-main { flex: 1; min-width: 0; }
.acct-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-head);
  margin-bottom: 4px;
}
.acct-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
  font-size: 12px;
}
.acct-balance {
  text-align: right;
  flex-shrink: 0;
}
.acct-balance-val {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.acct-balance-label {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.month-sep td {
  padding: 14px 10px 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  background: transparent;
}

.txn-empty {
  padding: 32px 0;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color .15s;
}
.back-link:hover { color: var(--text-head); }

tr.txn-edit-row { display:none; }
tr.txn-edit-row td { background:var(--bg3); }
</style>
{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;gap:var(--gap);">

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <a href="/accounts" class="back-link">← All Accounts</a>
    <a href="/data#transactions" class="back-link" style="color:var(--accent);">+ Add transaction →</a>
  </div>

  <!-- Account header -->
  <div class="card" id="acct-header">
    <div style="color:var(--text-dim);font-size:12px;">Loading…</div>
  </div>

  <!-- Payoff projection (credit/loan only) -->
  <div class="card" id="payoff-card" style="display:none;">
    <div class="section-title">Payoff Projection</div>
    <div id="payoff-body" style="font-size:12px;line-height:1.8;"></div>
  </div>

  <!-- Transaction list -->
  <div class="card">
    <div class="section-title" style="display:flex;align-items:center;gap:8px;">
      Transactions
      <span id="txn-count" style="font-size:10px;color:var(--text-dim);font-weight:400;"></span>
    </div>
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Payee</th>
            <th>Description</th>
            <th>Category</th>
            <th class="num">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="txn-body"><tr><td colspan="6" class="txn-empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const ACCOUNT_ID = {{ account_id }};
let _txns = [];
let allBudgetCats = [];

const TYPE_LABEL = {
  checking:'Checking', savings:'Savings', brokerage:'Brokerage',
  retirement_401k:'401(k)', retirement_ira:'IRA / Roth', hsa:'HSA',
  credit:'Credit Card', loan:'Loan', crypto:'Crypto', other:'Other'
};

async function load() {
  const [acct, txns, budgetCats] = await Promise.all([
    fetch(`/api/accounts/${ACCOUNT_ID}`).then(r => r.json()),
    fetch(`/api/accounts/${ACCOUNT_ID}/transactions`).then(r => r.json()),
    fetch('/api/budget-categories').then(r => r.json()),
  ]);

  const isLiab = acct.type === 'credit' || acct.type === 'loan';
  const bal = acct.balance;
  const balColor = isLiab ? 'var(--red)' : 'var(--text-head)';
  const balDisplay = bal != null ? fmt(isLiab ? -bal : bal) : '—';

  document.title = acct.name + ' — finn';
  document.getElementById('acct-header').innerHTML = `
    <div class="acct-header">
      <div class="acct-header-main">
        <div class="acct-name">${esc(acct.name)}</div>
        <div class="acct-meta">
          <span>${esc(acct.institution)}</span>
          <span style="color:var(--border);">·</span>
          <span class="badge blue">${TYPE_LABEL[acct.type] || acct.type}</span>
          ${acct.notes ? `<span style="color:var(--border);">·</span><span>${esc(acct.notes)}</span>` : ''}
        </div>
      </div>
      <div class="acct-balance">
        <div class="acct-balance-label">Current Balance</div>
        <div class="acct-balance-val" style="color:${balColor}">${balDisplay}</div>
      </div>
    </div>`;

  allBudgetCats = budgetCats;

  renderPayoff(acct);
  _txns = txns;
  renderTxns(_txns);
}

function renderPayoff(acct) {
  const card = document.getElementById('payoff-card');
  if (acct.type !== 'credit' && acct.type !== 'loan') return;
  card.style.display = 'block';

  const balance = acct.balance || 0;
  const apr     = acct.interest_rate;
  const minPay  = acct.minimum_payment;
  const body    = document.getElementById('payoff-body');

  if (!balance) {
    body.innerHTML = '<span style="color:var(--green);">Balance is $0 — paid off.</span>';
    return;
  }
  if (!apr || !minPay) {
    body.innerHTML = `<span style="color:var(--text-dim);">Set APR and minimum payment in
      <a href="/data#accounts" style="color:var(--accent);">Data → Accounts</a> to see payoff projection.</span>`;
    return;
  }

  const monthlyRate = apr / 100 / 12;
  const monthlyInterest = balance * monthlyRate;

  if (minPay <= monthlyInterest) {
    body.innerHTML = `
      <div style="color:var(--red);margin-bottom:6px;">
        Minimum payment (${fmt(minPay)}/mo) doesn't cover monthly interest (${fmt(monthlyInterest)}/mo).
        Balance will grow indefinitely.
      </div>
      <div style="color:var(--text-dim);font-size:11px;">Increase payment above ${fmt(monthlyInterest)} to make progress.</div>`;
    return;
  }

  // Amortize
  let bal = balance, totalInterest = 0, months = 0;
  while (bal > 0 && months < 600) {
    const interest = bal * monthlyRate;
    const principal = Math.min(minPay - interest, bal);
    totalInterest += interest;
    bal -= principal;
    months++;
  }

  const payoffDate = new Date();
  payoffDate.setMonth(payoffDate.getMonth() + months);
  const dateStr = payoffDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const years = Math.floor(months / 12), mos = months % 12;
  const timeStr = years > 0
    ? `${years}y ${mos}mo`
    : `${months} month${months !== 1 ? 's' : ''}`;

  body.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px;">
      <div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;">Time to payoff</div>
        <div style="color:var(--text-head);font-size:15px;font-weight:600;">${timeStr}</div>
        <div style="font-size:10px;color:var(--text-dim);">${dateStr}</div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;">Total interest</div>
        <div style="color:var(--red);font-size:15px;font-weight:600;">${fmt(totalInterest)}</div>
        <div style="font-size:10px;color:var(--text-dim);">at ${apr}% APR</div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;">Total paid</div>
        <div style="color:var(--text-head);font-size:15px;font-weight:600;">${fmt(balance + totalInterest)}</div>
        <div style="font-size:10px;color:var(--text-dim);">${fmt(minPay)}/mo minimum</div>
      </div>
    </div>`;
}

function renderTxns(txns) {
  document.getElementById('txn-count').textContent =
    txns.length ? `${txns.length} transaction${txns.length === 1 ? '' : 's'}` : '';

  if (!txns.length) {
    document.getElementById('txn-body').innerHTML =
      '<tr><td colspan="6" class="txn-empty">No transactions for this account yet.<br>' +
      '<a href="/data#transactions" style="color:var(--accent);font-size:11px;">Add one on the Data page →</a></td></tr>';
    return;
  }

  let html = '';
  let lastMonth = null;

  txns.forEach(t => {
    const mo = t.txn_date.slice(0, 7);
    if (mo !== lastMonth) {
      const d = new Date(t.txn_date + 'T00:00:00');
      const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      html += `<tr class="month-sep"><td colspan="6">${label}</td></tr>`;
      lastMonth = mo;
    }

    const isIncome = t.direction === 'income';
    const color = isIncome ? 'var(--green)' : t.direction === 'expense' ? 'var(--red)' : 'var(--text-dim)';
    const sign  = isIncome ? '+' : t.direction === 'expense' ? '−' : '';
    const dateLabel = new Date(t.txn_date + 'T00:00:00')
      .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    html += `
    <tr id="atrow-${t.id}">
      <td style="color:var(--text-dim);white-space:nowrap;">${dateLabel}</td>
      <td style="color:var(--text-head);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.payee) || '—'}</td>
      <td style="color:var(--text-dim);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.description) || ''}</td>
      <td><span class="badge blue">${esc(t.category)}</span></td>
      <td class="num" style="color:${color};font-variant-numeric:tabular-nums;">${sign}${fmt(t.amount)}</td>
      <td style="text-align:right;white-space:nowrap;">
        <div style="display:flex;gap:5px;justify-content:flex-end;">
          <button class="btn-secondary" onclick="startEdit(${t.id})">Edit</button>
          <button class="btn-danger" onclick="deleteTxn(${t.id})">Del</button>
        </div>
      </td>
    </tr>
    <tr id="atrow-edit-${t.id}" class="txn-edit-row">
      <td><input type="date" class="field-input" id="ae-date-${t.id}" value="${t.txn_date}" style="width:130px;" /></td>
      <td><input type="text" class="field-input" id="ae-payee-${t.id}" value="${esc(t.payee||'')}" placeholder="Payee" style="width:150px;" /></td>
      <td><input type="text" class="field-input" id="ae-desc-${t.id}" value="${esc(t.description||'')}" placeholder="Description" style="width:160px;" /></td>
      <td>
        <div style="display:flex;gap:4px;">
          <select class="field-input" id="ae-cat-${t.id}" style="width:130px;">${buildCatOpts(allBudgetCats, t.category)}</select>
          <select class="field-input" id="ae-dir-${t.id}" style="width:90px;">
            <option value="income"${t.direction==='income'?' selected':''}>income</option>
            <option value="expense"${t.direction==='expense'?' selected':''}>expense</option>
            <option value="transfer"${t.direction==='transfer'?' selected':''}>transfer</option>
          </select>
        </div>
      </td>
      <td class="num"><input type="number" class="field-input" id="ae-amt-${t.id}" value="${t.amount}" step="0.01" min="0" style="width:90px;text-align:right;" /></td>
      <td style="white-space:nowrap;">
        <div style="display:flex;gap:5px;justify-content:flex-end;">
          <button class="btn-primary" style="font-size:12px;padding:5px 12px;" onclick="saveEdit(${t.id})">Save</button>
          <button class="btn-secondary" onclick="cancelEdit(${t.id})">✕</button>
        </div>
      </td>
    </tr>`;
  });

  document.getElementById('txn-body').innerHTML = html;
}

function startEdit(id) {
  document.getElementById(`atrow-${id}`).style.display = 'none';
  document.getElementById(`atrow-edit-${id}`).style.display = 'table-row';
}
function cancelEdit(id) {
  document.getElementById(`atrow-${id}`).style.display = '';
  document.getElementById(`atrow-edit-${id}`).style.display = 'none';
}

async function saveEdit(id) {
  const body = {
    txn_date:    document.getElementById(`ae-date-${id}`).value,
    direction:   document.getElementById(`ae-dir-${id}`).value,
    category:    document.getElementById(`ae-cat-${id}`).value.trim(),
    amount:      parseFloat(document.getElementById(`ae-amt-${id}`).value),
    payee:       document.getElementById(`ae-payee-${id}`).value.trim() || null,
    description: document.getElementById(`ae-desc-${id}`).value.trim() || null,
    account_id:  ACCOUNT_ID,
  };
  await fetch(`/api/transactions/${id}`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
  });
  const txns = await fetch(`/api/accounts/${ACCOUNT_ID}/transactions`).then(r => r.json());
  _txns = txns;
  renderTxns(txns);
}

async function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
  _txns = _txns.filter(t => t.id !== id);
  renderTxns(_txns);
}

load();
</script>
{% endblock %}

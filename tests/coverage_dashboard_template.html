<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coverage Dashboard</title>
  <style>
    :root {
      --bg: #f7f6f3;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --track: #f1f5f9;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #eef2ff 0%, var(--bg) 32%);
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .header {
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 20px; }
    .sub { color: var(--muted); font-size: 13px; }
    .pill {
      background: #ecfeff;
      border: 1px solid #a5f3fc;
      color: #115e59;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .body { padding: 14px 18px 18px; }
    .links { margin: 2px 0 12px; }
    .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 6px; border-bottom: 1px solid var(--border); }
    th { text-align: left; color: var(--muted); font-weight: 700; font-size: 12px; letter-spacing: 0.03em; }
    td.file { width: 46%; word-break: break-word; }
    td.bar-cell { width: 44%; }
    td.pct { width: 10%; text-align: right; font-weight: 700; }
    .bar-track {
      width: 100%;
      height: 12px;
      background: var(--track);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 999px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div>
          <h1>Coverage Dashboard</h1>
          <div class="sub">Generated from coverage.xml</div>
        </div>
        <div class="pill">Overall: __OVERALL__</div>
      </div>
      <div class="body">
        <div class="links"><a href="index.html">Open htmlcov file details</a></div>
        <table>
          <thead>
            <tr><th>File</th><th>Coverage</th><th>%</th></tr>
          </thead>
          <tbody>
            __ROWS__
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
